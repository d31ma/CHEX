name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Run package blackbox tests
        run: bun run test:blackbox

  version:
    name: Read version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      package_name: ${{ steps.read.outputs.package_name }}
      version: ${{ steps.read.outputs.version }}
      tag_exists: ${{ steps.check.outputs.exists }}
      github_version_exists: ${{ steps.check_github.outputs.exists }}
      npm_version_exists: ${{ steps.check_npm.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read package version
        id: read
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PACKAGE_NAME"
          echo "Version: $VERSION"

      - name: Check version tag
        id: check
        env:
          TAG: v${{ steps.read.outputs.version }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists; skipping publish and release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check GitHub Packages version
        id: check_github
        env:
          PACKAGE_NAME: ${{ steps.read.outputs.package_name }}
          VERSION: ${{ steps.read.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > ~/.npmrc <<EOF
          @d31ma:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          EOF

          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Packages already has ${PACKAGE_NAME}@${VERSION}."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check npm version
        id: check_npm
        env:
          PACKAGE_NAME: ${{ steps.read.outputs.package_name }}
          VERSION: ${{ steps.read.outputs.version }}
        run: |
          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "npm already has ${PACKAGE_NAME}@${VERSION}."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to GitHub Packages
    needs: [test, version]
    if: needs.version.outputs.tag_exists == 'false' && needs.version.outputs.github_version_exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    environment: packages-prod

    steps:
      - name: Publish via FOUNDRY
        uses: d31ma/FOUNDRY/.github/actions/publish-github-package@main
        with:
          package_name: ${{ needs.version.outputs.package_name }}
          version: ${{ needs.version.outputs.version }}
          github_dist_tag: beta
          publish_token: ${{ github.token }}
          packages_read_token: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}

  promote-npm:
    name: Promote to npm registry
    needs: [version, publish]
    if: needs.publish.result == 'success'
    permissions:
      contents: read
      id-token: write
      packages: read
    uses: d31ma/FOUNDRY/.github/workflows/promote-npm.yml@main
    with:
      package_name: ${{ needs.version.outputs.package_name }}
      version: ${{ needs.version.outputs.version }}
      npm_dist_tag: latest
      source_repository: ${{ github.repository }}
    secrets:
      PACKAGES_READ_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [version, publish, promote-npm]
    if: needs.version.outputs.tag_exists == 'false'
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push version tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
